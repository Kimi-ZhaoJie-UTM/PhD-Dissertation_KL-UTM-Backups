<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Strategic-Institutional-Market Framework | 三维互动框架构建</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', 'PingFang SC', sans-serif;
            background: radial-gradient(ellipse at center, #1a1f3a 0%, #0a0e27 100%);
            color: #fff;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        .lang-switch {
            position: fixed;
            top: 15px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            padding: 5px;
            display: flex;
            gap: 5px;
            transition: opacity 0.5s;
        }

        .lang-btn {
            padding: 6px 16px;
            border: none;
            background: transparent;
            color: #fff;
            cursor: pointer;
            border-radius: 20px;
            transition: all 0.3s;
            font-size: 13px;
            font-weight: 500;
        }

        .lang-btn.active {
            background: #4a9eff;
            box-shadow: 0 0 20px rgba(74, 158, 255, 0.5);
        }

        .container {
            width: 100%;
            height: 100vh;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0;
            overflow: hidden;
        }

        .main-title {
            position: relative;
            z-index: 10;
            text-align: center;
            margin-bottom: 10px;
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(135deg, #4a9eff 0%, #00ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(74, 158, 255, 0.3);
            white-space: nowrap;
            cursor: pointer;
            user-select: none;
            transition: transform 0.3s, filter 0.3s;
            padding: 10px 20px;
            border-radius: 10px;
        }

        .main-title:hover {
            transform: scale(1.05);
            filter: brightness(1.2);
            background: rgba(255, 255, 255, 0.1);
        }

        .main-title.hidden-mode {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            margin-bottom: 0;
            z-index: 100;
        }

        .earth-scene {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 100vmin;
            height: 100vmin;
            transform: translate(-50%, -50%);
            perspective: 1500px;
            z-index: 0;
            transition: all 0.8s ease;
        }

        .earth-scene.fullscreen {
            width: 100vw;
            height: 100vh;
            perspective: 2000px;
        }

        /* 地球水平自转 - 不倾斜，从正上方俯视 */
        .earth-wrapper {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            /* 移除倾斜，保持水平正上方视角 */
            transform: rotateX(0deg);
        }

        .earth-spin {
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            animation: earthRotate 60s linear infinite;
        }

        @keyframes earthRotate {
            from { transform: rotateY(0deg); }
            to { transform: rotateY(360deg); }
        }

        .earth-wireframe {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 85vmin;
            height: 85vmin;
            margin-left: -42.5vmin;
            margin-top: -42.5vmin;
            transform-style: preserve-3d;
        }

        .ring {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .meridian {
            width: 85vmin;
            height: 85vmin;
            margin-left: -42.5vmin;
            margin-top: -42.5vmin;
            border: 1px solid rgba(74, 158, 255, 0.2);
        }

        .parallel {
            border: 1px dashed rgba(74, 158, 255, 0.15);
        }

        /* 赤道 - 实线 */
        .equator {
            width: 85vmin;
            height: 85vmin;
            margin-left: -42.5vmin;
            margin-top: -42.5vmin;
            border: 2px solid rgba(0, 255, 200, 0.8);
            box-shadow: 0 0 15px rgba(0, 255, 200, 0.4);
            transform: rotateX(90deg) translateZ(0);
        }

        /* 北回归线 - 虚线 */
        .tropic-cancer {
            width: 78vmin;
            height: 78vmin;
            margin-left: -39vmin;
            margin-top: -39vmin;
            border: 2px dashed rgba(255, 200, 100, 0.7);
            box-shadow: 0 0 10px rgba(255, 200, 100, 0.3);
            transform: rotateX(90deg) translateZ(17vmin);
        }

        /* 南回归线 - 虚线 */
        .tropic-capricorn {
            width: 78vmin;
            height: 78vmin;
            margin-left: -39vmin;
            margin-top: -39vmin;
            border: 2px dashed rgba(255, 200, 100, 0.7);
            box-shadow: 0 0 10px rgba(255, 200, 100, 0.3);
            transform: rotateX(90deg) translateZ(-17vmin);
        }

        .parallel-60n {
            width: 42.5vmin;
            height: 42.5vmin;
            margin-left: -21.25vmin;
            margin-top: -21.25vmin;
            border: 1px dashed rgba(74, 158, 255, 0.2);
            transform: rotateX(90deg) translateZ(36.8vmin);
        }

        .parallel-30n {
            width: 73.5vmin;
            height: 73.5vmin;
            margin-left: -36.75vmin;
            margin-top: -36.75vmin;
            border: 1px dashed rgba(74, 158, 255, 0.15);
            transform: rotateX(90deg) translateZ(21.25vmin);
        }

        .parallel-30s {
            width: 73.5vmin;
            height: 73.5vmin;
            margin-left: -36.75vmin;
            margin-top: -36.75vmin;
            border: 1px dashed rgba(74, 158, 255, 0.15);
            transform: rotateX(90deg) translateZ(-21.25vmin);
        }

        .parallel-60s {
            width: 42.5vmin;
            height: 42.5vmin;
            margin-left: -21.25vmin;
            margin-top: -21.25vmin;
            border: 1px dashed rgba(74, 158, 255, 0.2);
            transform: rotateX(90deg) translateZ(-36.8vmin);
        }

        /* 4大洲虚线轮廓 - 使用椭圆模拟 */
        .continent {
            position: absolute;
            top: 50%;
            left: 50%;
            border-radius: 50%;
            border: 2px dashed rgba(255, 255, 255, 0.4);
            transform-style: preserve-3d;
        }

        

        

        

        

        .city-marker {
            position: absolute;
            top: 50%;
            left: 50%;
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .city-point {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-left: -5px;
            margin-top: -5px;
            box-shadow: 0 0 15px currentColor, 0 0 30px currentColor;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.8; }
        }

        .city-label {
            position: absolute;
            white-space: nowrap;
            font-size: 12px;
            font-weight: bold;
            text-shadow: 0 0 4px rgba(0,0,0,1), 0 0 8px rgba(0,0,0,0.8);
            transform: translate(-50%, -22px);
            color: currentColor;
            pointer-events: none;
        }

        .city-label-en {
            font-size: 10px;
            opacity: 0.9;
            transform: translate(-50%, -2px);
        }

        .framework-svg {
            width: 95vw;
            height: 90vh;
            z-index: 10;
            filter: drop-shadow(0 0 20px rgba(0,0,0,0.5));
            transition: opacity 0.5s, transform 0.5s;
        }

        .framework-svg.hidden {
            opacity: 0;
            pointer-events: none;
            transform: scale(0.9);
        }

        .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .glass-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .layer-box {
            fill: rgba(30, 40, 80, 0.75);
            stroke: #4a9eff;
            stroke-width: 2;
            rx: 12;
        }

        .layer-title {
            fill: #4a9eff;
            font-size: 16px;
            font-weight: bold;
            text-anchor: middle;
        }

        .layer-title.en-small {
            font-size: 12px;
        }

        .content-box {
            fill: rgba(20, 30, 60, 0.9);
            stroke: #6b8cce;
            stroke-width: 1.5;
            rx: 6;
        }

        .content-text {
            fill: #fff;
            font-size: 12px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .label-box {
            fill: rgba(100, 120, 180, 0.3);
            stroke: #8aa4d0;
            stroke-width: 1;
            rx: 4;
        }

        .label-text {
            fill: #b8d4f0;
            font-size: 10px;
            text-anchor: middle;
            dominant-baseline: middle;
        }

        .connection-line {
            stroke: #6b8cce;
            stroke-width: 1.5;
            fill: none;
            marker-end: url(#arrowhead);
        }

        .bidirectional-line {
            stroke: #6b8cce;
            stroke-width: 1.5;
            fill: none;
            marker-start: url(#arrowhead-rev);
            marker-end: url(#arrowhead);
        }

        .runway-line {
            fill: none;
            stroke: #00ffff;
            stroke-width: 3;
            stroke-dasharray: 10, 10;
            opacity: 0.9;
            filter: drop-shadow(0 0 8px #00ffff);
        }

        .runway-line-up {
            animation: runwayUp 0.8s linear infinite;
        }

        .runway-line-down {
            animation: runwayDown 0.8s linear infinite;
        }

        @keyframes runwayUp {
            to { stroke-dashoffset: -20; }
        }

        @keyframes runwayDown {
            to { stroke-dashoffset: 20; }
        }

        .hint-text {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .hint-text.visible {
            opacity: 1;
        }

        @media (max-width: 900px) {
            .main-title { font-size: 18px; }
            .city-label { font-size: 10px; }
            .city-label-en { font-size: 8px; }
            .layer-title { font-size: 14px; }
            .content-text { font-size: 11px; }
            .label-text { font-size: 9px; }
        }
            .region-legend {
            position: fixed;
            top: 15px;
            left: 20px;
            z-index: 1000;
            background: rgba(10, 14, 39, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 12px;
            padding: 12px 15px;
            display: flex;
            flex-direction: column;
            gap: 6px;
            transition: opacity 0.5s;
        }
        .legend-title {
            color: #4a9eff;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 4px;
            padding-bottom: 4px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .legend-item {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #fff;
            font-size: 11px;
        }
        .legend-color {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            box-shadow: 0 0 8px currentColor;
        }
        .legend-stats {
            color: #888;
            font-size: 10px;
            margin-top: 4px;
            text-align: center;
        }
        @media (max-width: 900px) {
            .region-legend {
                top: 60px;
                left: 10px;
                padding: 8px 10px;
            }
            .legend-title { font-size: 10px; }
            .legend-item { font-size: 9px; }
        }

            .glass-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.4);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 8;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        .glass-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .hint-text {
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.7);
            font-size: 14px;
            z-index: 20;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            text-shadow: 0 0 10px rgba(0,0,0,0.8);
        }

        .hint-text.visible {
            opacity: 1;
        }

        .main-title.hidden-mode {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 20px;
            margin-bottom: 0;
            z-index: 100;
        }

        /* 地球模糊效果 */
        .earth-scene.blur {
            filter: blur(20px);
            transition: filter 0.5s ease;
        }

    
        /* 弹出层（模态框）样式 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(10, 14, 39, 0.85);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(30, 40, 80, 0.95) 0%, rgba(20, 30, 60, 0.98) 100%);
            border: 2px solid #4a9eff;
            border-radius: 20px;
            max-width: 800px;
            width: 100%;
            max-height: 80vh;
            overflow-y: auto;
            padding: 40px;
            position: relative;
            box-shadow: 0 0 60px rgba(74, 158, 255, 0.3), inset 0 0 20px rgba(74, 158, 255, 0.1);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1) translateY(0);
        }

        .modal-close {
            position: absolute;
            top: 20px;
            right: 25px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s;
            z-index: 10;
        }

        .modal-close:hover {
            background: rgba(255, 100, 100, 0.3);
            border-color: rgba(255, 100, 100, 0.5);
            transform: rotate(90deg);
        }

        .modal-title {
            font-size: 28px;
            font-weight: bold;
            background: linear-gradient(135deg, #4a9eff 0%, #00ffff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 1px solid rgba(74, 158, 255, 0.3);
        }

        .modal-text {
            color: #e0e6ed;
            font-size: 14px;
            line-height: 1.6;
            text-align: justify;
        }

        .modal-text p {
            margin-bottom: 20px;
        }

        .modal-text strong {
            color: #4a9eff;
            font-weight: 600;
        }

        /* 框架模糊效果（当弹出层打开时） */
        .framework-blur {
            filter: blur(5px);
            pointer-events: none;
            transition: filter 0.4s ease;
        }

        /* 可点击框体的光标样式 */
        .content-box {
            cursor: pointer;
        }

        .content-box:hover {
            fill: rgba(74, 158, 255, 0.4);
            stroke: #00ffff;
            filter: drop-shadow(0 0 10px rgba(0, 255, 255, 0.5));
        }

        @media (max-width: 768px) {
            .modal-content {
                padding: 25px;
                max-height: 85vh;
            }
            .modal-title {
                font-size: 22px;
            }
            .modal-text {
                font-size: 14px;
            }
        }

    
        /* 英文版本优化样式 */
        .content-text.en {
            font-size: 9px;
        }

        .label-text.en {
            font-size: 8px;
        }

        .layer-title.en {
            font-size: 14px;
        }

    </style>

<body>

    <div class="lang-switch" id="langSwitch">
        <button class="lang-btn active" onclick="switchLang('zh')">中文</button>
        <button class="lang-btn" onclick="switchLang('en')">English</button>
    </div>

    <div class="region-legend" id="regionLegend">
        <div class="legend-title" data-zh="一带一路参与国（按大洲）" data-en="BRI Countries (by Region)">一带一路参与国（按大洲）</div>
        <div class="legend-item"><span class="legend-color" style="background:#ff6b6b"></span><span data-zh="亚洲" data-en="Asia">亚洲</span></div>
        <div class="legend-item"><span class="legend-color" style="background:#ffd93d"></span><span data-zh="非洲" data-en="Africa">非洲</span></div>
        <div class="legend-item"><span class="legend-color" style="background:#6bcfbf"></span><span data-zh="欧洲" data-en="Europe">欧洲</span></div>
        <div class="legend-item"><span class="legend-color" style="background:#52d681"></span><span data-zh="美洲" data-en="Americas">美洲</span></div>
        <div class="legend-item"><span class="legend-color" style="background:#c084fc"></span><span data-zh="大洋洲" data-en="Oceania">大洋洲</span></div>
        <div class="legend-stats" id="legendStats">共159国</div>
    </div>

    <div class="glass-overlay" id="glassOverlay"></div>

    <div class="hint-text" id="hintText">点击标题隐藏框架 | Click title to hide</div>

    <div class="container">
        <h1 class="main-title" id="mainTitle" onclick="toggleFramework()">Strategic-Institutional-Market Framework | 三维互动框架构建</h1>

        <div class="earth-scene" id="earthScene">
            <div class="earth-wrapper">
                <div class="earth-spin" id="earthSpin">
                    <div class="earth-wireframe" id="earthWireframe">
                        <!-- 赤道线 - 实线 -->
                        <div class="ring equator"></div>
                        <!-- 北回归线 - 虚线 -->
                        <div class="ring tropic-cancer"></div>
                        <!-- 南回归线 - 虚线 -->
                        <div class="ring tropic-capricorn"></div>
                        
                        <!-- 其他纬线 -->
                        <div class="ring parallel-60n"></div>
                        <div class="ring parallel-30n"></div>
                        <div class="ring parallel-30s"></div>
                        <div class="ring parallel-60s"></div>

                        <!-- 5大洋虚线环 -->

                        <!-- 4大洲虚线轮廓 -->

                        <!-- 经线（12条） -->
                        <div class="ring meridian" style="transform: rotateY(0deg);"></div>
                        <div class="ring meridian" style="transform: rotateY(30deg);"></div>
                        <div class="ring meridian" style="transform: rotateY(60deg);"></div>
                        <div class="ring meridian" style="transform: rotateY(90deg);"></div>
                        <div class="ring meridian" style="transform: rotateY(120deg);"></div>
                        <div class="ring meridian" style="transform: rotateY(150deg);"></div>

                        <!-- 城市标记容器 -->
                    </div>
                </div>
            </div>
        </div>

        <!-- 主架构图SVG -->
        <svg class="framework-svg" id="frameworkSvg" viewBox="0 0 1000 700" xmlns="http://www.w3.org/2000/svg">
            <defs>
                <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
                    <polygon points="0 0, 10 3, 0 6" fill="#6b8cce" />
                </marker>
                <marker id="arrowhead-rev" markerWidth="10" markerHeight="10" refX="0" refY="3" orient="auto">
                    <polygon points="10 0, 0 3, 10 6" fill="#6b8cce" />
                </marker>
                <filter id="boxShadow">
                    <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
                </filter>
            </defs>

            <!-- 第三层：制度协同层 (底层) -->
            <g id="layer3" transform="translate(0, 480)">
                <rect class="layer-box" x="50" y="0" width="900" height="140" filter="url(#boxShadow)"/>
                <ellipse cx="500" cy="0" rx="80" ry="20" fill="#0a0e27" stroke="#4a9eff" stroke-width="2"/>
                <text class="layer-title" x="500" y="5" data-zh="制度协同层" data-en="Institutional Coordination">制度协同层</text>
                
                <!-- 三个内容框 -->
                <rect class="content-box" x="100" y="40" width="200" height="60" onclick="openModal('market')"/>
                <text class="content-text" x="200" y="70" data-zh="监管规则与标准" data-en="Regulatory Rules & Standards">监管规则与标准</text>
                
                <rect class="content-box" x="400" y="40" width="200" height="60" onclick="openModal('market')"/>
                <text class="content-text" x="500" y="70" data-zh="法律与仲裁服务" data-en="Legal & Arbitration Services">法律与仲裁服务</text>
                
                <rect class="content-box" x="700" y="40" width="200" height="60" onclick="openModal('market')"/>
                <text class="content-text" x="800" y="70" data-zh="专业人才体系" data-en="Professional Talent System">专业人才体系</text>
                
                <!-- 内部连接线 -->
                <line class="bidirectional-line" x1="300" y1="70" x2="400" y2="70"/>
                <line class="bidirectional-line" x1="600" y1="70" x2="700" y2="70"/>
            </g>

            <!-- 第二层：战略对接层 (中层) -->
            <g id="layer2" transform="translate(0, 280)">

        // 经纬度转换为3D坐标（水平面正上方视角）
        function latLonToXYZ(lat, lon, radius) {
            const latRad = lat * Math.PI / 180;
            const lonRad = lon * Math.PI / 180;
            
            // 正上方俯视（北极视角），经度对应平面角度
            const x = radius * Math.cos(latRad) * Math.sin(lonRad);
            const y = -radius * Math.sin(latRad);
            const z = radius * Math.cos(latRad) * Math.cos(lonRad);
            
            return { x, y, z };
        }

        // 初始化城市标记
        function initCities() {
            const container = document.getElementById('earthWireframe');
            const radius = 42.5; // vmin单位

            cities.forEach((city, index) => {
                const pos = latLonToXYZ(city.lat, city.lon, radius);
                
                const marker = document.createElement('div');
                marker.className = 'city-marker';
                marker.style.color = city.color;
                marker.style.transform = `translate3d(${pos.x}vmin, ${pos.y}vmin, ${pos.z}vmin)`;
                
                marker.innerHTML = `
                    <div class="city-point" style="background-color: ${city.color}; animation-delay: ${index * 0.2}s;"></div>
                    <div class="city-label">${city.name}</div>
                    <div class="city-label city-label-en">${city.nameEn}</div>
                `;
                
                container.appendChild(marker);
            });
        }

        // 切换框架显示/隐藏
        function toggleFramework() {
            const framework = document.getElementById('frameworkSvg');
            const scene = document.getElementById('earthScene');
            const overlay = document.getElementById('glassOverlay');
            const title = document.getElementById('mainTitle');
            const langSwitch = document.getElementById('langSwitch');
            const hint = document.getElementById('hintText');

            isFrameworkVisible = !isFrameworkVisible;

            if (isFrameworkVisible) {
                framework.classList.remove('hidden');
                scene.classList.remove('fullscreen');
                scene.classList.add('blur');
                overlay.classList.add('active');
                title.classList.remove('hidden-mode');
                langSwitch.style.opacity = '1';
                hint.classList.remove('visible');
                hint.textContent = currentLang === 'zh' ? '点击标题隐藏框架 | Click title to hide' : '点击标题隐藏框架 | Click title to hide';
            } else {
                framework.classList.add('hidden');
                scene.classList.add('fullscreen');
                if (scene) scene.classList.remove('blur');
                overlay.classList.remove('active');
                title.classList.add('hidden-mode');
                langSwitch.style.opacity = '0';
                hint.classList.add('visible');
                hint.textContent = currentLang === 'zh' ? '点击标题显示框架 | Click title to show framework' : '点击标题显示框架 | Click title to show framework';
            }
        }

        // 语言切换功能
        function switchLang(lang) {
            currentLang = lang;
            document.querySelectorAll('.lang-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');

            const hint = document.getElementById('hintText');
            if (isFrameworkVisible) {
                hint.textContent = lang === 'zh' ? '点击标题隐藏框架 | Click title to hide' : '点击标题隐藏框架 | Click title to hide';
            } else {
                hint.textContent = lang === 'zh' ? '点击标题显示框架 | Click title to show framework' : '点击标题显示框架 | Click title to show framework';
            }

            const elements = document.querySelectorAll('[data-zh][data-en]');
            elements.forEach(el => {
                const content = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');

                // 添加/移除英文样式类
                if (lang === 'en') {
                    el.classList.add('en');
                } else {
                    el.classList.remove('en');
                }
                
                if (el.tagName === 'text') {
                    el.innerHTML = '';
                    
                    if (content.includes('&#10;')) {
                        const lines = content.split('&#10;');
                        lines.forEach((line, index) => {
                            const tspan = document.createElementNS('http://www.w3.org/2000/svg', 'tspan');
                            tspan.textContent = line;
                            tspan.setAttribute('x', el.getAttribute('x'));
                            
                            let dy;
                            if (lang === 'en') {
                                // 英文使用更紧凑的行间距
                                if (lines.length === 2) {
                                    dy = index === 0 ? '-3' : '11';
                                } else if (lines.length === 3) {
                                    dy = index === 0 ? '-6' : (index === 1 ? '10' : '10');
                                } else if (lines.length === 4) {
                                    dy = index === 0 ? '-7' : (index === 1 ? '8' : (index === 2 ? '8' : '8'));
                                }
                            } else {
                                // 中文使用正常行间距
                                if (lines.length === 2) {
                                    dy = index === 0 ? '-5' : '13';
                                } else if (lines.length === 3) {
                                    dy = index === 0 ? '-10' : (index === 1 ? '12' : '12');
                                } else if (lines.length === 4) {
                                    dy = index === 0 ? '-12' : (index === 1 ? '10' : (index === 2 ? '10' : '10'));
                                }
                            }
                            tspan.setAttribute('dy', dy);
                            el.appendChild(tspan);
                        });

                        if (lang === 'en' && (el.id === 'title1' || el.id === 'title2' || el.id === 'title3')) {
                            el.classList.add('en-small');
                        } else {
                            el.classList.remove('en-small');
                        }
                    } else {
                        el.textContent = content;
                        el.classList.remove('en-small');
                    }
                } else {
                    el.textContent = content;
                }
            });

                    // 更新图例语言
        document.querySelectorAll('.region-legend [data-zh][data-en]').forEach(el => {
            const content = lang === 'zh' ? el.getAttribute('data-zh') : el.getAttribute('data-en');

                // 添加/移除英文样式类
                if (lang === 'en') {
                    el.classList.add('en');
                } else {
                    el.classList.remove('en');
                }
            el.textContent = content;
        });
        document.documentElement.lang = lang === 'zh' ? 'zh-CN' : 'en';
        }

        // 初始化
        window.addEventListener('load', function() {
            // 初始化：显示框架，地球模糊
            const scene = document.getElementById('earthScene');
            const overlay = document.getElementById('glassOverlay');
            if (scene) scene.classList.add('blur');
            if (overlay) overlay.classList.add('active');

            initCities();
            switchLang('zh');
            document.getElementById('glassOverlay').classList.add('active');
        });

        // 鼠标悬停效果
        document.querySelectorAll('.content-box').forEach(box => {
            box.addEventListener('mouseenter', function() {
                this.style.fill = 'rgba(74, 158, 255, 0.4)';
                this.style.stroke = '#00ffff';
                this.style.transition = 'all 0.3s';
            });
            box.addEventListener('mouseleave', function() {
                this.style.fill = 'rgba(20, 30, 60, 0.9)';
                this.style.stroke = '#6b8cce';
            });
        });
    </script>
